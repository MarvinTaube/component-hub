name: component-hub
version: '3.8'

services:
  db:
    container_name: component-hub-db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: component_hub
    ports:
      - "5432:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    container_name: component-hub-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/component_hub
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    ports:
      - "8778:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    container_name: component-hub-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8777:80"
    depends_on:
      - backend
    restart: unless-stopped